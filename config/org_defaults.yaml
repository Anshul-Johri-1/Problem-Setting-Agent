# Fixed org-wide rules (§0, §2). NOT agent-editable — these are read by the
# orchestrator and harness as hard limits, not suggestions.

max_test_files: 15
min_solution_files: 7
max_solution_files: 10
min_generator_files: 3
min_validator_stress_tests: 10
prefer_multitest: true
default_checker_policy: standard_first

# Optional: collaborators every new problem should automatically get a
# reminder to add (Polygon has no API for granting access, so this can never
# be automated — see polygon_client/access.py). Empty by default; add entries
# like `- handle: some_team\n  permission: WRITE` if your org wants one.
access_grants: []

retry_cap: 5
